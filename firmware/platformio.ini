; PlatformIO Configuration for Soil Moisture Monitoring System
; Board: ESP8266 (NodeMCU / Wemos D1 Mini)

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    tzapu/WiFiManager@^0.16.0
upload_speed = 921600

; Build flags
build_flags =
    -DSERIAL_BAUD=115200
